<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
<script>localStorage.setItem('aws_quiz_theme','light')</script>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"></button>
<div id="app"></div>
<script src="app.js"></script>
<script>
setTimeout(()=>{
  selectExam('clf-c02');
  setTimeout(()=>{
    startQuiz();
    setTimeout(()=>{
      const skip = document.querySelector('.btn-skip');
      const optInd = document.querySelector('.opt-indicator');
      const badge = document.querySelector('.badge-muted');
      const out = [];
      if(skip){
        const r = skip.getBoundingClientRect();
        const cs = getComputedStyle(skip);
        out.push('SKIP BTN: '+r.width.toFixed(1)+'x'+r.height.toFixed(1)+'px, font:'+cs.fontSize+', lh:'+cs.lineHeight+', py:'+cs.paddingTop+'/'+cs.paddingBottom+', px:'+cs.paddingLeft+'/'+cs.paddingRight+', radius:'+cs.borderRadius+', border:'+cs.borderWidth);
      }
      if(optInd){
        const r = optInd.getBoundingClientRect();
        const cs = getComputedStyle(optInd);
        out.push('OPT-IND: '+r.width.toFixed(1)+'x'+r.height.toFixed(1)+'px, radius:'+cs.borderRadius+', border:'+cs.borderWidth);
      }
      if(badge){
        const r = badge.getBoundingClientRect();
        const cs = getComputedStyle(badge);
        out.push('BADGE: '+r.width.toFixed(1)+'x'+r.height.toFixed(1)+'px, font:'+cs.fontSize+', padding:'+cs.padding+', radius:'+cs.borderRadius);
      }
      document.getElementById('app').innerHTML='<pre style="font-size:14px;padding:20px">'+out.join('\n')+'</pre>';
    },500);
  },500);
},2000);
</script>
</body>
</html>
